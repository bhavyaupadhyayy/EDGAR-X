---
# Developer extras layered on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Adds Kafka UI for topic inspection and MinIO (S3-compatible store used by
# the Layer 3 model artifact pipeline).

services:
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: edgar-x-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-edgarx}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-edgarx-dev-only}
    volumes:
      - minio-data:/data

volumes:
  minio-data:
