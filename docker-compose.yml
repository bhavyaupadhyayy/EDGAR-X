---
# EDGAR-X local infrastructure: Kafka + Schema Registry, Airflow, Redis, Postgres.
# Usage: cp .env.example .env  &&  docker compose up -d

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.4-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_FOLDER: /opt/edgar_x/ingestion/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/${POSTGRES_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    PYTHONPATH: /opt/edgar_x
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    SCHEMA_REGISTRY_URL: http://schema-registry:8081
    REDIS_URL: redis://redis:6379/0
    EDGAR_USER_AGENT: ${EDGAR_USER_AGENT:-}
    FRED_API_KEY: ${FRED_API_KEY:-}
    POLYGON_API_KEY: ${POLYGON_API_KEY:-}
    REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
    REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
    REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-}
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    EDGAR_X_UNIVERSE: ${EDGAR_X_UNIVERSE:-AAPL,MSFT,NVDA,AMZN,GOOGL}
    # Dev convenience only — Layer 7 bakes a proper image with pinned deps.
    # confluent-kafka is pinned <2.8: newer schema-registry clients require an
    # httpx that conflicts with Airflow 2.8's pinned httpx.
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      httpx pydantic pydantic-settings structlog beautifulsoup4 lxml asyncpraw
      confluent-kafka[avro]==2.5.0 fastavro
  volumes:
    - ./:/opt/edgar_x
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_started
    schema-registry:
      condition: service_started

services:
  zookeeper:
    restart: unless-stopped
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    restart: unless-stopped
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  schema-registry:
    restart: unless-stopped
    image: confluentinc/cp-schema-registry:7.5.3
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >-
        airflow db migrate &&
        airflow users create
        --username admin --password admin
        --firstname EDGAR --lastname X
        --role Admin --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "18080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
