# EDGAR-X CI — this workflow GENUINELY RUNS on GitHub's free tier for public
# repos. It lints, type-independent tests with coverage, and validates the dbt
# project against the zero-credential DuckDB dev target. None of it touches a
# cloud account, Snowflake, or paid resources.
#
# The image build-and-push job at the bottom is intentionally DISABLED (guarded
# by an `if: false`) and documented: enabling it requires real AWS/ECR
# credentials and would push to a registry that is not provisioned. It is here
# as deployment-ready reference, not as a running job.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: Lint
        # Mirrors the project's lint discipline (ruff check, incl. import sort).
        run: ruff check .

  test:
    name: pytest + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        # Coverage gate (--cov-fail-under=80) is configured in pyproject.toml.
        run: pytest

  dbt:
    name: dbt parse + compile (DuckDB dev target)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transforms/dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dbt-duckdb
        run: pip install "dbt-core>=1.8" "dbt-duckdb>=1.8"
      - name: dbt parse
        # Ephemeral, zero-credential: DuckDB writes to a local file in the runner.
        run: dbt parse --target dev --profiles-dir .
      - name: dbt compile
        # Resolves the full model DAG and compiles SQL without needing warehouse data.
        run: dbt compile --target dev --profiles-dir .

  # ---------------------------------------------------------------------------
  # DISABLED on purpose. Building and pushing container images requires real AWS
  # credentials and a provisioned ECR registry (see ../../infrastructure/terraform).
  # Neither exists — this project is deployment-ready, NOT deployed. Flip `if:`
  # to a real condition and add the AWS OIDC role + ECR repo before enabling.
  build-and-push-image:
    name: build & push images to ECR (DISABLED — would need real registry)
    if: false
    runs-on: ubuntu-latest
    needs: [lint, test, dbt]
    permissions:
      id-token: write # for AWS OIDC
      contents: read
    strategy:
      matrix:
        service: [agents, api, dashboard, jobs]
    steps:
      - uses: actions/checkout@v4
      # - name: Configure AWS credentials (OIDC — no static keys)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/edgar-x-prod-ci-ecr-push
      #     aws-region: us-east-1
      # - name: Login to Amazon ECR
      #   id: ecr
      #   uses: aws-actions/amazon-ecr-login@v2
      # - name: Build and push
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     file: docker/${{ matrix.service }}.Dockerfile
      #     push: true
      #     tags: ${{ steps.ecr.outputs.registry }}/edgar-x/${{ matrix.service }}:${{ github.sha }}
      - name: Disabled notice
        run: |
          echo "This job is intentionally disabled (if: false)."
          echo "Enabling it would push images to a registry that is not provisioned."
          exit 1
