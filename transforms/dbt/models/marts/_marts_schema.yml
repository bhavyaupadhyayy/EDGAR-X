version: 2

models:
  - name: company_profile
    description: One row per company with latest ratios and filing activity.
    columns:
      - name: ticker
        tests: [unique, not_null]
      - name: sector
        tests: [not_null]
      - name: pe_ratio
        tests:
          - financial_ratio_bounds:
              arguments:
                min_value: -1000
                max_value: 1000

  - name: filing_history
    description: One row per filing with language features.
    columns:
      - name: accession_number
        tests: [unique, not_null]
      - name: ticker
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('company_profile')
                field: ticker
      - name: filing_date
        tests: [not_null]

  - name: signal_history
    description: One row per ticker-day with combined signals.
    columns:
      - name: signal_id
        tests: [unique, not_null]
      - name: ticker
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('company_profile')
                field: ticker
      - name: composite_signal_score
        tests:
          - not_null
          - financial_ratio_bounds:
              arguments:
                min_value: 0
                max_value: 100

  - name: sector_summary
    description: One row per sector with aggregates.
    columns:
      - name: sector
        tests: [unique, not_null]
      - name: company_count
        tests: [not_null]

  - name: ml_training_set
    description: >
      Labelable company-fiscal-years for the revenue-direction model.
      Label = 1 if FY(N+1) revenue exceeds FY(N) revenue.
    columns:
      - name: ml_row_id
        tests: [unique, not_null]
      - name: label
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
                quote: false
      - name: ticker
        tests: [not_null]
      - name: fiscal_year
        tests: [not_null]
      - name: sector
        tests: [not_null]
      - name: revenue
        tests: [not_null]
      - name: fed_funds_rate
        tests: [not_null]
      - name: yield_curve_spread
        tests: [not_null]

  - name: ml_inference_set
    description: Most recent fiscal year per company; label pending, inference only.
    columns:
      - name: ml_row_id
        tests: [unique, not_null]
      - name: ticker
        tests: [not_null]
      - name: revenue
        tests: [not_null]
