version: 2

models:
  - name: int_financial_ratios
    description: Financial ratios per company per fiscal quarter.
    columns:
      - name: fundamental_id
        tests: [unique, not_null]
      - name: pe_ratio
        tests:
          - financial_ratio_bounds:
              arguments:
                min_value: -1000
                max_value: 1000
      - name: debt_to_equity
        tests:
          # Sanity ceiling catches unit/scale errors only. Real near-zero-
          # equity balance sheets (post-spin-off ALLE: d/e 65; buyback-heavy
          # ABBV: d/e 20+) legitimately exceed tight business-rule bounds.
          - financial_ratio_bounds:
              arguments:
                min_value: 0
                max_value: 1000
      # Margin bounds are scoped to non-Financials: bank/insurer revenue is
      # not captured by the XBRL revenue concepts we extract, so their
      # margins are not meaningful (same reason Financials are excluded from
      # the ML training set). Bounds reflect real observed extremes: COVID-era
      # cruise lines reached net margins near -7 and one-time gains (eBay
      # FY2021 Adevinta) push net margin above 1.
      - name: net_margin
        tests:
          - financial_ratio_bounds:
              arguments:
                min_value: -20
                max_value: 3
              config:
                where: "sector is null or sector != 'Financials'"
      - name: gross_margin
        tests:
          - financial_ratio_bounds:
              arguments:
                min_value: -5
                max_value: 1
              config:
                where: "sector is null or sector != 'Financials'"

  - name: int_filing_language_features
    description: Language features per filing.
    columns:
      - name: accession_number
        tests: [unique, not_null]
      - name: risk_word_total
        tests: [not_null]

  - name: int_options_flow_daily
    description: Daily options-flow aggregates per underlying.
    columns:
      - name: flow_id
        tests: [unique, not_null]
      - name: total_volume
        tests: [not_null]

  - name: int_sentiment_daily
    description: Daily sentiment aggregates per ticker.
    columns:
      - name: sentiment_id
        tests: [unique, not_null]
      - name: mention_count
        tests: [not_null]
