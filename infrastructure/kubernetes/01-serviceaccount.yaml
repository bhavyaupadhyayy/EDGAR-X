# Service account the EDGAR-X workloads run as. Annotated for IRSA so pods
# assume the IAM role defined in ../terraform/iam.tf (app_secrets) and can read
# the Snowflake/Anthropic secrets from AWS Secrets Manager — no static AWS keys
# in the cluster.
#
# Replace <ACCOUNT_ID> with the target account at deploy time (the exact ARN is
# emitted by the Terraform output `app_secrets_role_arn`). Placeholder only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: edgar-x-app
  namespace: edgar-x
  labels:
    app.kubernetes.io/part-of: edgar-x
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/edgar-x-prod-app-secrets
