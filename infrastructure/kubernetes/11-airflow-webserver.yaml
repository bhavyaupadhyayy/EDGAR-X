# Airflow webserver — the UI/API for the pipeline. Fronted by a ClusterIP
# Service (an Ingress/ALB would be added per the cluster's ingress controller;
# kept ClusterIP here to avoid implying a public endpoint exists).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: edgar-x
  labels:
    app.kubernetes.io/part-of: edgar-x
    app.kubernetes.io/component: webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: webserver
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: edgar-x
        app.kubernetes.io/component: webserver
    spec:
      serviceAccountName: edgar-x-app
      containers:
        - name: webserver
          image: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/edgar-x/jobs:latest
          args: ["airflow", "webserver"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: edgar-x-config
            - secretRef:
                name: edgar-x-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: edgar-x
  labels:
    app.kubernetes.io/part-of: edgar-x
    app.kubernetes.io/component: webserver
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: webserver
  ports:
    - name: http
      port: 80
      targetPort: http
